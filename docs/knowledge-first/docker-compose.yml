version: "3.9"

services:
  arangodb:
    image: arangodb:3.11
    environment:
      - ARANGO_ROOT_PASSWORD=changeme
    ports:
      - "8529:8529"
    healthcheck:
      test: ["CMD", "arangosh", "--server.endpoint", "tcp://127.0.0.1:8529", "--server.password", "changeme", "--server.username", "root", "--javascript.execute-string", "db._databases()"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Example memory-agent MCP server (JSON-RPC over HTTP)
  # Replace the image and env with your org's memory-agent build.
  memory-agent:
    image: your-registry/memory-agent:latest
    depends_on:
      - arangodb
    environment:
      - ARANGO_URL=http://arangodb:8529
      - ARANGO_DB=codex
      - ARANGO_USER=root
      - ARANGO_PASSWORD=changeme
      - BIND=0.0.0.0:8080
    ports:
      - "8080:8080"
    # The MCP server should expose a JSON-RPC endpoint that accepts methods like
    # `memory.search` and `memory.neighbors`. Point cxplus to it with:
    #   -c context.provider=arango -c context.arango.mcp_tool=memory-agent \
    #   -c context.arango.endpoint=http://localhost:8080/jsonrpc

