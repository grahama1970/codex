<!-- cxplus — Text-First Wordmark (CSS keyframe / frame-based; no SMIL, no JS) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" role="img" aria-labelledby="t d" text-rendering="geometricPrecision" data-static="false">
  <title id="t">cxplus — animated wordmark (CSS frames)</title>
  <desc id="d">Cyan sweep across a static wordmark; “+” pops in (overshoot), spins L→R then R→L, then pops out (pre-bump). No motion of base letters, including the ‘x’.</desc>

  <style>
    :root{
      --accentSecondary:#2FD4CB;
      --fg:#E6EDF3;
      --bg:#0B1220;
      --ease:cubic-bezier(.25,.1,.25,1);
      --cycle:3s; /* full loop */
    }
    .bg{fill:var(--bg)}
    .wm{fill:var(--fg);font:700 44px/1.05 "Nunito","SF Pro Rounded","Avenir Next Rounded","Quicksand","Segoe UI Rounded","Inter",system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue","Arial Rounded MT Bold",Arial,"Noto Sans","Liberation Sans",sans-serif;letter-spacing:-.3px}
    .wmCyan{fill:var(--accentSecondary)}
    .plus{fill:var(--accentSecondary)}

    /* Reduced motion / static */
    @media (prefers-reduced-motion: reduce){
      svg:not([data-animate="force"]) .anim{ animation-play-state: paused !important; }
    }
    svg[data-static="true"] .anim{ animation: none !important; }

    /* ---------------------------
       Sweep widths (3s cycle)
       (times mapped to percentages: time/3 * 100)
       --------------------------- */

    /* c: grow 0–4%, collapse 70.333–71.333% */
    #cSweep{ width:0px; animation:cWidth var(--cycle) linear infinite both; }
    @keyframes cWidth{
      0% { width:0px; }
      4% { width:200px; animation-timing-function: var(--ease); }   /* ease over 0→4% */
      70.333% { width:200px; animation-timing-function: var(--ease);}/* ease over 70.333→71.333% */
      71.333% { width:0px; }
      100% { width:0px; }
    }

    /* x sweep: grow 4–8%, collapse 69.333–70.333% (x glyph itself stays static) */
    #xSweep{ width:0px; animation:xWidth var(--cycle) linear infinite both; }
    @keyframes xWidth{
      0%,4% { width:0px; }
      8%    { width:200px; animation-timing-function: var(--ease); }
      69.333% { width:200px; animation-timing-function: var(--ease); }
      70.333% { width:0px; }
      100% { width:0px; }
    }

    /* p: grow 8–12%, collapse 68.333–69.333% */
    #pClipRect{ width:0px; animation:pWidth var(--cycle) linear infinite both; }
    @keyframes pWidth{
      0%,8% { width:0px; }
      12%   { width:240px; animation-timing-function: var(--ease); }
      68.333% { width:240px; animation-timing-function: var(--ease); }
      69.333% { width:0px; }
      100% { width:0px; }
    }

    /* l: grow 12–16%, collapse 67.333–68.333% */
    #lClipRect{ width:0px; animation:lWidth var(--cycle) linear infinite both; }
    @keyframes lWidth{
      0%,12% { width:0px; }
      16%    { width:240px; animation-timing-function: var(--ease); }
      67.333% { width:240px; animation-timing-function: var(--ease); }
      68.333% { width:0px; }
      100% { width:0px; }
    }

    /* u: grow 16–20%, collapse 66.333–67.333% */
    #uClipRect{ width:0px; animation:uWidth var(--cycle) linear infinite both; }
    @keyframes uWidth{
      0%,16% { width:0px; }
      20%    { width:240px; animation-timing-function: var(--ease); }
      66.333% { width:240px; animation-timing-function: var(--ease); }
      67.333% { width:0px; }
      100% { width:0px; }
    }

    /* s: grow 20–24%, collapse 65.333–66.333% */
    #sClipRect{ width:0px; animation:sWidth var(--cycle) linear infinite both; }
    @keyframes sWidth{
      0%,20% { width:0px; }
      24%    { width:260px; animation-timing-function: var(--ease); }
      65.333% { width:260px; animation-timing-function: var(--ease); }
      66.333% { width:0px; }
      100% { width:0px; }
    }

    /* ---------------------------
       Plus accent
       Pop-in (overshoot), Spin L→R then R→L, Pop-out (pre-bump then shrink)
       Times: pop-in 24–30.667%; wait 0.02s; spins 31.333–46.333 and 46.333–61.333;
              pop-out 61.333–65.333%
       --------------------------- */

    /* Opacity gate */
    #plusGlyph{ opacity:0; animation:plusOpacity var(--cycle) linear infinite both; }
    @keyframes plusOpacity{
      0%,24%      { opacity:0; }
      30.667%     { opacity:1; animation-timing-function: linear; }
      61.333%     { opacity:1; animation-timing-function: var(--ease); }
      65.333%,100%{ opacity:0; }
    }

    /* Rotation (two eased segments) */
    #plusR{ transform-box:fill-box; transform-origin:50% 50%;
            animation:plusRotate var(--cycle) linear infinite both; }
    @keyframes plusRotate{
      0%,31.333%  { transform: rotate(0deg); }
      46.333%     { transform: rotate(360deg); animation-timing-function: var(--ease); } /* 31.333→46.333 */
      61.333%     { transform: rotate(0deg);   animation-timing-function: var(--ease); } /* 46.333→61.333 */
      100%        { transform: rotate(0deg); }
    }

    /* Scale: stronger pop-in overshoot and visible pop-out bump */
    #plusS{ transform-box:fill-box; transform-origin:50% 50%;
            animation:plusScale var(--cycle) linear infinite both; }
    @keyframes plusScale{
      /* Pop-in with stronger overshoot */
      0%,24%      { transform: scale(0); }
      28.667%     { transform: scale(1.22); animation-timing-function: var(--ease); }  /* overshoot ↑ */
      30.667%     { transform: scale(1.00); }

      /* Hold through spins */
      61.333%     { transform: scale(1.00); animation-timing-function: var(--ease); }

      /* Pop-out with a quick pre-bump, then shrink to zero */
      62.667%     { transform: scale(1.16); animation-timing-function: var(--ease); }  /* tiny “pop” */
      65.333%,100%{ transform: scale(0); }
    }

    /* Subtle glow */
    #plusGlyph{ filter:url(#plusGlow); }
  </style>

  <rect class="bg" width="100%" height="100%" aria-hidden="true"/>

  <defs>
    <filter id="plusGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.85" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Static glyph clipPaths -->
    <clipPath id="clipC" clipPathUnits="userSpaceOnUse">
      <text class="wm" x="0" y="0" font-size="44" font-weight="700">c</text>
    </clipPath>
    <clipPath id="clipX" clipPathUnits="userSpaceOnUse">
      <text class="wm" x="22" y="0" font-size="44" font-weight="700">x</text>
    </clipPath>

    <!-- Tall sweep clip rects (add .anim so reduced-motion can pause them) -->
    <clipPath id="cpP" clipPathUnits="userSpaceOnUse"><rect id="pClipRect" class="anim" x="50"  y="-200" width="0" height="400"/></clipPath>
    <clipPath id="cpL" clipPathUnits="userSpaceOnUse"><rect id="lClipRect" class="anim" x="76"  y="-200" width="0" height="400"/></clipPath>
    <clipPath id="cpU" clipPathUnits="userSpaceOnUse"><rect id="uClipRect" class="anim" x="86"  y="-200" width="0" height="400"/></clipPath>
    <clipPath id="cpS" clipPathUnits="userSpaceOnUse"><rect id="sClipRect" class="anim" x="112" y="-200" width="0" height="400"/></clipPath>
  </defs>

  <!-- Layout group: baseline at y=56 -->
  <g transform="translate(20,56)">
    <!-- Base wordmark: fully static (no transforms on any letter) -->
    <text class="wm" x="0"  y="0">c</text>
    <text class="wm" x="22" y="0">x</text>
    <text class="wm" x="50" y="0">p</text>
    <text class="wm" x="76" y="0">l</text>
    <text class="wm" x="86" y="0">u</text>
    <text class="wm" x="112" y="0">s</text>

    <!-- Cyan overlay (only moving parts) -->
    <g id="cyanOverlay">
      <g clip-path="url(#clipC)"><rect id="cSweep" class="anim" x="0"  y="-120" width="0" height="240" fill="#2FD4CB"/></g>
      <g clip-path="url(#clipX)"><rect id="xSweep" class="anim" x="22" y="-120" width="0" height="240" fill="#2FD4CB"/></g>

      <!-- p l u s cyan as text masked by tall rects -->
      <g clip-path="url(#cpP)"><text class="wm wmCyan" x="50"  y="0">p</text></g>
      <g clip-path="url(#cpL)"><text class="wm wmCyan" x="76"  y="0">l</text></g>
      <g clip-path="url(#cpU)"><text class="wm wmCyan" x="86"  y="0">u</text></g>
      <g clip-path="url(#cpS)"><text class="wm wmCyan" x="112" y="0">s</text></g>
    </g>

    <!-- Plus accent at the top-right of ‘s’ -->
    <g id="plusAcc" transform="translate(140,-26)">
      <g id="plusR" class="anim">
        <g id="plusS" class="anim">
          <g id="plusGlyph" class="anim" style="transform-box:fill-box;transform-origin:50% 50%">
            <rect class="plus" x="-7" y="-2" width="14" height="4" rx="2"/>
            <rect class="plus" x="-2" y="-7" width="4"  height="14" rx="2"/>
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>
