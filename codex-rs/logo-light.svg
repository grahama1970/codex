<!-- cxplus — logo7 (light mode) -->
<!-- Derived from logo7.svg with light background/dark foreground preset -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" role="img" aria-labelledby="t d" text-rendering="geometricPrecision" data-static="false" focusable="false">
  <title id="t">cxplus — animated wordmark (light)</title>
  <desc id="d">Light-mode variant. Background #FFFFFF, foreground #0B1220, accent via --accent (default cyan). Same animation and timing as logo7.svg.</desc>
  <style>
    :root{
      --accent:#2FD4CB;
      --fg:#0B1220;  /* dark ink */
      --bg:#FFFFFF;  /* light background */
      --ease:cubic-bezier(.25,.1,.25,1);
      --cycle:8s;
    }
  </style>
  <!-- Inline logo7 body with variables preset for light -->
  <style>
    .bg{ fill:var(--bg) }
    .wm{ fill:var(--fg); font:700 44px/1.05 "Nunito","SF Pro Rounded","Avenir Next Rounded","Quicksand","Segoe UI Rounded","Inter",system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue","Arial Rounded MT Bold",Arial,"Noto Sans","Liberation Sans",sans-serif; letter-spacing:-.3px; font-kerning:normal; font-feature-settings:"kern" 1,"liga" 1; text-rendering:optimizeLegibility; }
    .wmCyan{ fill:var(--accent) }
    .plus{   fill:var(--accent) }
    .accentFill{ fill:var(--accent) }
    #wmGlowLayer{ pointer-events:none; opacity:0; filter:url(#wmGlow); }
    @keyframes wmGlowPulse{ 0%,37.5%{opacity:0;animation-timing-function:var(--ease);}55%{opacity:.035;}70%{opacity:.015;}85%{opacity:.03;}100%{opacity:0;} }
    @media (prefers-reduced-motion: reduce){ svg:not([data-animate="force"]) .anim{ animation:none!important;} svg:not([data-animate="force"]) #cSweep{width:200px;} svg:not([data-animate="force"]) #xSweep{width:200px;} svg:not([data-animate="force"]) #pClipRect{width:240px;} svg:not([data-animate="force"]) #lClipRect{width:240px;} svg:not([data-animate="force"]) #uClipRect{width:240px;} svg:not([data-animate="force"]) #sClipRect{width:260px;} svg:not([data-animate="force"]) #plusGlyph{opacity:1;transform:scale(1);} svg:not([data-animate="force"]) #plusR{transform:rotate(0deg);} svg:not([data-animate="force"]) #wmGlowLayer{animation:none!important;opacity:0!important;} }
    svg[data-static="true"] .anim{ animation:none!important;} svg[data-static="true"] #cSweep{width:200px;} svg[data-static="true"] #xSweep{width:200px;} svg[data-static="true"] #pClipRect{width:240px;} svg[data-static="true"] #lClipRect{width:240px;} svg[data-static="true"] #uClipRect{width:240px;} svg[data-static="true"] #sClipRect{width:260px;} svg[data-static="true"] #plusGlyph{opacity:1;transform:scale(1);} svg[data-static="true"] #plusR{transform:rotate(0deg);} svg[data-static="true"] #wmGlowLayer{animation:none!important;opacity:0!important;}
    #cSweep{width:0;animation:cWidth var(--cycle) linear infinite both}@keyframes cWidth{0%{width:0;animation-timing-function:var(--ease)}1.5%{width:200px;animation-timing-function:linear}26.374%{width:200px;animation-timing-function:var(--ease)}26.75%{width:0;animation-timing-function:linear}100%{width:0}}
    #xSweep{width:0;animation:xWidth var(--cycle) linear infinite both}@keyframes xWidth{0%{width:0;animation-timing-function:linear}1.5%{width:0;animation-timing-function:var(--ease)}3%{width:200px;animation-timing-function:linear}26.0%{width:200px;animation-timing-function:var(--ease)}26.375%{width:0;animation-timing-function:linear}100%{width:0}}
    #pClipRect{width:0;animation:pWidth var(--cycle) linear infinite both}@keyframes pWidth{0%{width:0;animation-timing-function:linear}3%{width:0;animation-timing-function:var(--ease)}4.5%{width:240px;animation-timing-function:linear}25.625%{width:240px;animation-timing-function:var(--ease)}26.0%{width:0;animation-timing-function:linear}100%{width:0}}
    #lClipRect{width:0;animation:lWidth var(--cycle) linear infinite both}@keyframes lWidth{0%{width:0;animation-timing-function:linear}4.5%{width:0;animation-timing-function:var(--ease)}6.0%{width:240px;animation-timing-function:linear}25.25%{width:240px;animation-timing-function:var(--ease)}25.625%{width:0;animation-timing-function:linear}100%{width:0}}
    #uClipRect{width:0;animation:uWidth var(--cycle) linear infinite both}@keyframes uWidth{0%{width:0;animation-timing-function:linear}6.0%{width:0;animation-timing-function:var(--ease)}7.5%{width:240px;animation-timing-function:linear}24.875%{width:240px;animation-timing-function:var(--ease)}25.25%{width:0;animation-timing-function:linear}100%{width:0}}
    #sClipRect{width:0;animation:sWidth var(--cycle) linear infinite both}@keyframes sWidth{0%{width:0;animation-timing-function:linear}7.5%{width:0;animation-timing-function:var(--ease)}9.0%{width:260px;animation-timing-function:linear}24.5%{width:260px;animation-timing-function:var(--ease)}24.875%{width:0;animation-timing-function:linear}100%{width:0}}
    #plusGlyph{opacity:0;transform-box:fill-box;transform-origin:50% 50%;animation:plusOpacity var(--cycle) linear infinite both,plusScale var(--cycle) linear infinite both;filter:url(#plusGlow)}
    #plusR,#plusS{transform-box:fill-box;transform-origin:50% 50%}
    #plusR{animation:plusRotate var(--cycle) linear infinite both}
    @keyframes plusOpacity{0%{opacity:0}9%{opacity:1}37.5%{opacity:0}100%{opacity:0}}
    @keyframes plusRotate{0%{transform:rotate(0)}13.125%{transform:rotate(0);animation-timing-function:var(--ease)}18.75%{transform:rotate(360deg);animation-timing-function:var(--ease)}24%{transform:rotate(0)}100%{transform:rotate(0)}}
    @keyframes plusScale{0%{transform:scale(0)}9%{transform:scale(0);animation-timing-function:var(--ease)}12.225%{transform:scale(2.16);animation-timing-function:var(--ease)}12.75%{transform:scale(1)}12.975%{transform:scale(1.25);animation-timing-function:var(--ease)}13.0875%{transform:scale(1)}23%{transform:scale(1);animation-timing-function:var(--ease)}24.0375%{transform:scale(1.80);animation-timing-function:var(--ease)}37.5%{transform:scale(0)}100%{transform:scale(0)}}
    .anim{animation-duration:var(--cycle)} #wmGlowLayer.anim{animation:wmGlowPulse var(--cycle) linear infinite both}
  </style>
  <rect class="bg" width="100%" height="100%" aria-hidden="true"/>
  <defs>
    <filter id="wmGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB"><feGaussianBlur in="SourceGraphic" stdDeviation="1.25" result="wmBlur"/><feMerge><feMergeNode in="wmBlur"/></feMerge></filter>
    <filter id="plusGlow" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB"><feGaussianBlur in="SourceGraphic" stdDeviation="0.85" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <mask id="maskC" maskUnits="userSpaceOnUse" maskContentUnits="userSpaceOnUse" x="0" y="-140" width="210" height="300" style="mask-type:luminance"><rect x="0" y="-140" width="210" height="300" fill="black"/><text class="wm" x="0" y="0" fill="white" dominant-baseline="alphabetic">c</text></mask>
    <mask id="maskX" maskUnits="userSpaceOnUse" maskContentUnits="userSpaceOnUse" x="22" y="-140" width="210" height="300" style="mask-type:luminance"><rect x="22" y="-140" width="210" height="300" fill="black"/><text class="wm" x="22" y="0" fill="white" dominant-baseline="alphabetic">x</text></mask>
    <clipPath id="cpP" clipPathUnits="userSpaceOnUse"><rect id="pClipRect" class="anim" x="50" y="-200" width="0" height="400"/></clipPath>
    <clipPath id="cpL" clipPathUnits="userSpaceOnUse"><rect id="lClipRect" class="anim" x="76" y="-200" width="0" height="400"/></clipPath>
    <clipPath id="cpU" clipPathUnits="userSpaceOnUse"><rect id="uClipRect" class="anim" x="86" y="-200" width="0" height="400"/></clipPath>
    <clipPath id="cpS" clipPathUnits="userSpaceOnUse"><rect id="sClipRect" class="anim" x="112" y="-200" width="0" height="400"/></clipPath>
  </defs>
  <g transform="translate(20,56)">
    <g id="wmGlowLayer" class="anim" aria-hidden="true">
      <text class="wm" x="0" y="0">c</text><text class="wm" x="22" y="0">x</text><text class="wm" x="50" y="0">p</text><text class="wm" x="76" y="0">l</text><text class="wm" x="86" y="0">u</text><text class="wm" x="112" y="0">s</text>
    </g>
    <text class="wm" x="0" y="0">c</text><text class="wm" x="22" y="0">x</text><text class="wm" x="50" y="0">p</text><text class="wm" x="76" y="0">l</text><text class="wm" x="86" y="0">u</text><text class="wm" x="112" y="0">s</text>
    <g id="cyanOverlay">
      <g mask="url(#maskC)"><rect id="cSweep" class="anim accentFill" x="0" y="-120" width="0" height="240"/></g>
      <g mask="url(#maskX)"><rect id="xSweep" class="anim accentFill" x="22" y="-120" width="0" height="240"/></g>
      <g clip-path="url(#cpP)"><text class="wm wmCyan" x="50" y="0">p</text></g>
      <g clip-path="url(#cpL)"><text class="wm wmCyan" x="76" y="0">l</text></g>
      <g clip-path="url(#cpU)"><text class="wm wmCyan" x="86" y="0">u</text></g>
      <g clip-path="url(#cpS)"><text class="wm wmCyan" x="112" y="0">s</text></g>
    </g>
    <g id="plusAcc" transform="translate(140,-26)">
      <g id="plusR" class="anim"><g id="plusS" class="anim"><g id="plusGlyph" class="anim"><rect class="plus" x="-7" y="-2" width="14" height="4" rx="2"/><rect class="plus" x="-2" y="-7" width="4" height="14" rx="2"/></g></g></g>
    </g>
  </g>
</svg>
